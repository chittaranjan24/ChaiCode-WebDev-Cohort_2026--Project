<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YouTube Videos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">

<header class="bg-white border-b border-gray-200 px-6 py-3.5 flex items-center gap-2.5 sticky top-0 z-10">
  <!-- YouTube icon -->
  <svg class="flex-shrink-0" width="28" height="20" viewBox="0 0 28 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="28" height="20" rx="5" fill="#e11d48"/>
    <polygon points="11,5 11,15 20,10" fill="white"/>
  </svg>
  <h1 class="text-lg font-semibold tracking-tight">YouTube <span class="text-rose-600">Videos</span></h1>
</header>

<main class="max-w-6xl mx-auto px-5 py-7">
  <div id="app">
    <div class="flex flex-col items-center justify-center gap-3 py-20 px-5 text-gray-500 text-sm">
      <div class="w-9 h-9 border-4 border-gray-200 border-t-rose-600 rounded-full animate-spin"></div>
      <span>Loading videos…</span>
    </div>
  </div>
</main>

<script type="module" src="scripts.js"></script>
</body>
</html>
